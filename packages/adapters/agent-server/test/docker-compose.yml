services:
  obsku-test-agent:
    build:
      context: ../../../..
      dockerfile: packages/adapters/agent-server/test/Dockerfile
    ports:
      - "19001:9000"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:9000/ping').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 3s
