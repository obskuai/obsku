name: Release

on:
  push:
    branches: [main]

# Prevent concurrent releases
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed for Changesets to determine what changed
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Run full CI gate before any release action
      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify publish readiness
        run: bun run verify:publish

      # Changesets release-PR model:
      # - When changesets are present: creates/updates "Version Packages" PR
      # - When "Version Packages" PR is merged: publishes packages to npm
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          # Command run only when publishing (after Version Packages PR is merged)
          publish: bunx changeset publish
          # Command run to bump versions in the Version Packages PR
          version: bunx changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
